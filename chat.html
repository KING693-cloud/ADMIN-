<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Inbox</title>
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Segoe UI", sans-serif; 
        }
        
        body { 
            background: url('1.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            color: white; 
        }
        
        .container { 
            max-width: 600px; 
            margin: auto; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: rgba(0, 0, 0, 0.85); 
            border-left: 1px solid #222; 
            border-right: 1px solid #222; 
        }
        
        /* HEADER SECTION */
        .header { 
            padding: 20px; 
            background: #075e54; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            font-weight: bold; 
            font-size: 18px; 
            color: #fff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .back-btn { 
            background: none; 
            border: none; 
            color: white; 
            font-size: 24px; 
            cursor: pointer; 
            padding: 5px; 
        }

        /* LIST AREA */
        .list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
        }
        
        /* FAST SPINNER ANIMATION */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #25d366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            /* Animation set to very fast 0.5s */
            animation: spin 0.5s linear infinite;
            margin: 60px auto 15px auto;
        }

        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* CARD STYLING */
        .user-card { 
            padding: 22px; 
            margin-bottom: 15px; 
            background: rgba(255, 255, 255, 0.08); 
            border-radius: 18px; 
            cursor: pointer; 
            position: relative; 
            animation: rollIn 0.5s ease-out forwards; 
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes rollIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .user-card:hover { 
            background: rgba(255, 255, 255, 0.15); 
        }
        
        .user-card b { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 17px; 
            color: #fff; 
        }
        
        .msg-text { 
            display: block; 
            opacity: 0.9; 
            font-size: 14px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        .cart-msg { 
            color: #ff4757 !important; 
            font-weight: bold; 
        }
        
        .badge { 
            position: absolute; 
            top: 18px; 
            right: 18px; 
            background: #25d366; 
            color: white; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">←</button>
            ADMIN INBOX
        </div>

        <div id="list" class="list">
            <div id="loader">
                <div class="spinner"></div>
                <p style="text-align:center; opacity:0.6;">Syncing active chats...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // APP INITIALIZATION
        const db = getFirestore(initializeApp({
            apiKey: "AIzaSy...",
            authDomain: "happytails-50138.firebaseapp.com",
            projectId: "happytails-50138",
        }));

        const list = document.getElementById("list");

        // SNAPSHOT LISTENER
        onSnapshot(collection(db, "chats"), (snap) => {
            let chats = [];
            
            snap.forEach(d => {
                const data = d.data();
                chats.push({
                    id: d.id,
                    lastMessage: data.lastMessage || "No message yet...",
                    lastTime: data.lastTime || 0,
                    lastType: data.lastType || "text",
                    unread: (data.lastSender === "customer") && (data.lastTime > (data.lastSeenByAdmin || 0))
                });
            });

            // SORT BY TIME
            chats.sort((a, b) => b.lastTime - a.lastTime);

            // CLEAR AND REBUILD
            list.innerHTML = "";

            // BUILD LIST
            chats.forEach(c => {
                const isCart = c.lastType === "buy";
                const displayText = isCart ? `🛒 BUYING NOW: ${c.lastMessage}` : c.lastMessage;
                
                const div = document.createElement("div");
                div.className = "user-card";
                div.innerHTML = `
                    <b>${c.id.toUpperCase()}</b>
                    <small class="msg-text ${isCart ? 'cart-msg' : ''}">${displayText}</small>
                    ${c.unread ? `<div class="badge">NEW</div>` : ""}
                `;
                
                // CLICK ACTION
                div.onclick = async () => {
                    await updateDoc(doc(db, "chats", c.id), { lastSeenByAdmin: Date.now() });
                    window.location.href = "con.html?user=" + c.id;
                };
                
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
